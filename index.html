<!DOCTYPE html>
<html ng-app="todoApp">
<head>
    <meta charset="utf-8">
    <title>AngularJS Todo List</title>

    
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

   
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>

<body ng-controller="TodoController" class="container" style="margin-top:30px;">

    <div class="panel panel-primary">
        <div class="panel-heading">
            <h3 class="panel-title">DAILY TASK TO-DO LIST</h3>
        </div>

        <div class="panel-body">

           
            <form ng-submit="addTask()" class="form-inline">
                <div class="form-group">
                    <input type="text" class="form-control" placeholder="Task name" ng-model="newTask.name" required>
                </div>

                <div class="form-group">
                    <input type="date" class="form-control" ng-model="newTask.date" required>
                </div>

               <button type="submit" class="btn btn-success">
                    Add Daily Task
                </button>
            </form>

            <hr>
            <table class="table table-bordered table-striped">
                <thead>
                    <tr>
                        
                        <th>Task</th>
                        <th>Date</th>
                        <th>Completed</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr ng-repeat="task in tasks">
                        <td>{{$index + 1}}</td>
                        <td>{{task.name}}</td>
                        <td>{{task.date | date:'yyyy-MM-dd'}}</td>
                        <td>
                            <input type="checkbox" ng-model="task.completed">
                        </td>
                        <td>
                            <button class="btn btn-danger btn-xs" ng-click="removeTask($index)">
                                Delete
                            </button>
                        </td>
                    </tr>

                    <tr ng-if="tasks.length === 0">
                        <td colspan="5" class="text-center">No tasks added</td>
                    </tr>
                </tbody>
            </table>

        </div>
    </div>

<script>
angular.module('todoApp', [])
.controller('TodoController', function($scope) {

    $scope.tasks = [];

    $scope.newTask = {
        name: '',
        date: '',
        completed: false
    };

    $scope.addTask = function() {
        $scope.tasks.push({
            name: $scope.newTask.name,
            date: $scope.newTask.date,
            completed: false
        });

        $scope.newTask = {
            name: '',
            date: '',
            completed: false
        };
    };

    $scope.removeTask = function(index) {
        $scope.tasks.splice(index, 1);
    };

});
</script>

</body>
</html>
